server:
  port: 8086

spring:
  application:
    name: reward-service
  datasource:
    url: jdbc:postgresql://localhost:5432/reward_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reward-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        # Wrap the JSON deserializer in ErrorHandlingDeserializer so a single bad payload
        # (e.g. a foreign event shape published to a topic we listen on) does NOT enter an
        # infinite retry loop that fills the disk with stack traces (we caught one of these
        # blowing the log file to ~88 GB before truncation). The bad record is logged once
        # and skipped; the listener stays healthy.
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.cognizant.Reward_service.dto.event.RewardEventDTO
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

jwt:
  secret: myVerySecretKeyForJWTThatIsLongEnoughForHS512Signature

app:
  jwt:
    secret: myVerySecretKeyForJWTThatIsLongEnoughForHS512Signature
  reward:
    rules:
      ticket-resolved: 50
      solution-approved: 30
      knowledge-created: 20
      upvote-received: 5
  kafka:
    topics:
      ticket-resolved: ticket.resolved
      solution-approved: solution.approved
      knowledge-created: knowledge.created
      solution-voted: solution.voted
      knowledge-rated: knowledge.rated
      reward-points-added: reward.points.added
      reward-badge-awarded: reward.badge.awarded
      leaderboard-updated: leaderboard.updated

logging:
  level:
    root: INFO
    com.cognizant.Reward_service: DEBUG
    org.springframework.kafka: INFO
